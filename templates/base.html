<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}The Ledger{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="ledger-shell">
  <header class="ledger-header">
    <div class="ledger-header-inner">
      <a href="{{ url_for('dashboard') }}" class="brand">
        <span class="brand-mark">§</span>
        <span class="brand-text">The Ledger</span>
      </a>
      <nav class="ledger-nav">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('add_subscription') }}" class="nav-cta">+ Log entry</a>
      </nav>
    </div>
  </header>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-stack">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <main class="ledger-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="ledger-footer">
    <span>Every renewal, accounted for.</span>
  </footer>
</div>
</body>
</html>
